<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart – Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <a href="index.html"><div class="logo"></div></a>
            </div>
            <div class="nav-search" style="width:500px;">
                <select class="search-select"><option>All</option></select>
                <input type="text" placeholder="Search Amazon.in" class="search-input">
                <div class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>
            <div class="nav-signin border" onclick="window.location='login.html'">
                <p><span>Hello, sign in</span></p>
                <p class="nav-second">Account & Lists</p>
            </div>
            <div class="nav-cart border" onclick="window.location='cart.html'" style="color:#f08804;">
                <i class="fa-solid fa-cart-shopping"></i> Cart
            </div>
        </div>
    </header>

    <!-- CART CONTENT -->
    <div class="cart-page">
        <div class="cart-container">

            <!-- CART ITEMS -->
            <div class="cart-items">
                <h2>Shopping Cart</h2>
                <div id="cartItemsList"></div>
            </div>

            <!-- SUMMARY -->
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <p id="cartSummaryText" class="cart-total">Subtotal: ₹0</p>
                <button class="checkout-btn" onclick="handleCheckout()">
                    Proceed to Buy
                </button>
                <p style="font-size:0.75rem; color:#555; margin-top:10px; text-align:center;">
                    Eligible for FREE Delivery
                </p>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="foot-panel3">
            <div class="logo"></div>
        </div>
        <div class="student-info">
            <p>
                <strong>Name:</strong> Sparsh Singh &nbsp;|&nbsp;
                <strong>Section:</strong> CSE 24 &nbsp;|&nbsp;
                <strong>Roll No:</strong> 2503201001179
            </p>
        </div>
    </footer>

    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartItemsList');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <h3>Your Amazon Cart is empty</h3>
                        <p style="margin:10px 0">Go back and add something!</p>
                        <a href="index.html" style="color:#007185; font-weight:700;">Continue shopping →</a>
                    </div>`;
                document.getElementById('cartSummaryText').textContent = 'Subtotal: ₹0';
                return;
            }

            let total = 0;
            let html = '';

            cart.forEach((item, idx) => {
                const priceNum = parseInt(item.price.replace(/[^0-9]/g, ''));
                total += priceNum;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-img" style="background-image: url('${item.img}')"></div>
                        <div class="cart-item-info">
                            <h3>${item.name}</h3>
                            <p>${item.price}</p>
                            <p style="color:#007600; font-size:0.8rem;">In Stock</p>
                            <button class="cart-item-remove" onclick="removeItem(${idx})">Remove</button>
                        </div>
                    </div>`;
            });

            container.innerHTML = html;
            document.getElementById('cartSummaryText').innerHTML =
                `Subtotal (${cart.length} item${cart.length > 1 ? 's' : ''}): <span style="color:#B12704">₹${total.toLocaleString('en-IN')}</span>`;
        }

        function removeItem(idx) {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }

        function handleCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) { alert('Your cart is empty!'); return; }
            alert('Order placed successfully! Thank you for shopping with Amazon.');
            localStorage.removeItem('cart');
            loadCart();
        }

        loadCart();
    </script>
</body>
</html>
